---
- name: Clone dotfiles-secrets repository
  git:
    repo: "{{ dotfiles_secrets_repo }}"
    dest: "{{ dotfiles_secrets_repo_local_destination }}"
    version: "{{ dotfiles_secrets_repo_version }}"
    accept_hostkey: "{{ dotfiles_secrets_repo_accept_hostkey }}"
  become: false

- name: Ensure .config directory exists
  file:
    path: "{{ dotfiles_home }}/.config"
    state: directory
    mode: '0700'
  become: false

- name: Check if secrets symlink already exists
  stat:
    path: "{{ dotfiles_home }}/.config/secrets"
  register: secrets_dir
  become: false

- name: Link dotfiles secrets directory into home folder.
  file:
    src: "{{ dotfiles_secrets_repo_local_destination }}"
    dest: "{{ dotfiles_home }}/.config/secrets"
    state: link
  when: not secrets_dir.stat.exists
  become: false
